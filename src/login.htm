<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Centro Deportivo · Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar navbar-expand-lg align-items-center px-4 py-3 header-bg">
    <div class="container-fluid d-flex align-items-center justify-content-center">
      <a class="d-flex align-items-center gap-3 brand-link" href="index.html">
        <img src="images/logo.png" alt="Centro Deportivo" class="logo-img">
        <div class="brand-text text-center">
          <div class="h6 mb-0">Centro Deportivo</div>
          <div class="small text-beige">Portal de Acceso</div>
        </div>
      </a>
    </div>
  </header>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-5">
        <div class="card page-card p-4 p-md-5">
          <h1 class="h4 mb-4 text-carbon text-center fw-bold">Iniciar Sesión</h1>
          
          <form action="index.html">
            <div class="mb-3">
              <label for="email" class="form-label text-carbon fw-bold small">Correo electrónico</label>
              <input type="email" class="form-control search-input" style="width: 100%" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label text-carbon fw-bold small">Contraseña</label>
              <input type="password" class="form-control search-input" style="width: 100%" id="password" placeholder="••••••••" required>
            </div>
            <div class="d-grid mb-4">
              <button type="submit" class="btn btn-primary btn-lg">Ingresar</button>
            </div>
            <div class="text-center text-muted small">
              ¿No tienes una cuenta? <a href="registro.html" class="link-primary">Regístrate aquí</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </main>

</body>
</html>
