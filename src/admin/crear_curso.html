<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Centro Deportivo · Crear curso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilos_crud.css">
</head>
<body>
<header class="navbar navbar-expand-lg align-items-center px-4 py-3 header-bg">
    <div class="container-fluid d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <a class="d-flex align-items-center gap-3 brand-link" href="../index.html">
          <img src="../images/logo.png" alt="Centro Deportivo" class="logo-img">
          <div class="brand-text">
            <div class="h6 mb-0">Centro Deportivo</div>
            <div class="small text-beige">Panel de Administración</div>
          </div>
        </a>
        <nav class="d-none d-md-flex gap-3 nav-left">
          <a class="nav-link text-beige" href="../index.html">Inicio</a>
          <a class="nav-link text-beige" href="cursos.htm">Cursos</a>
        </nav>
      </div>
      <a class="user-box d-flex align-items-center gap-2" href="perfil_usuario.htm">
        <img src="../images/avatar.jpg" alt="Avatar" class="user-avatar">
        <div class="user-name">Administrador</div>
      </a>
    </div>
  </header>
  <main class="container">
    <div class="page-card form-card mb-5">
      <h1 style="margin:0; font-size:1.6rem;">Crear nuevo curso</h1>
    <p style="margin:8px 0 0; color:var(--muted);">Agrega los datos del curso para publicarlo en el sistema.</p>
    
    <form class="form-grid" action="#" method="post" novalidate>
      <div>
        <label class="form-label" for="courseName">Nombre del curso</label>
        <input class="form-input" type="text" id="courseName" name="courseName" required placeholder="Ej. Yoga para principiantes" />
      </div>

      <div class="full-width">
        <label class="form-label" for="description">Descripción</label>
        <textarea class="form-input" id="description" name="description" rows="4" placeholder="Describe brevemente el curso"></textarea>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label" for="schedule">Horario</label>
          <input class="form-input" type="text" id="schedule" name="schedule" placeholder="Ej. Lun/Mié 18:00-19:00" />
        </div>
        <div>
          <label class="form-label" for="level">Nivel</label>
          <select class="form-input" id="level" name="level" required>
            <option value="" disabled selected>Selecciona un nivel</option>
            <option value="beginner">Principiante</option>
            <option value="intermediate">Intermedio</option>
            <option value="advanced">Avanzado</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label" for="startDate">Fecha de inicio</label>
          <input class="form-input" type="date" id="startDate" name="startDate" required />
        </div>
        <div>
          <label class="form-label" for="endDate">Fecha de fin</label>
          <input class="form-input" type="date" id="endDate" name="endDate" required />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label class="form-label" for="capacity">Cupo máximo</label>
          <input class="form-input" type="number" id="capacity" name="capacity" min="1" placeholder="Ej. 20" />
        </div>
        <div>
          <label class="form-label" for="instructor">Instructor</label>
          <input class="form-input" type="text" id="instructor" name="instructor" placeholder="Ej. Juan Pérez" />
        </div>
      </div>

      <div>
        <label class="form-label" for="price">Costo</label>
        <input class="form-input" type="number" id="price" name="price" min="0" step="0.01" placeholder="Ej. 25.00" />
      </div>

      <div class="full-width" style="display:flex;justify-content:flex-end;gap:12px;margin-top:14px;flex-wrap:wrap;">
        <button type="reset" class="btn-outline-primary" style="min-width:120px;">Limpiar</button>
        <button type="submit" class="btn-primary" style="min-width:120px;">Crear curso</button>
      </div>
    </form>
    </div>
  </main>
  <footer class="text-center py-3 small text-muted">© Centro Deportivo</footer>
</body>
</html>
