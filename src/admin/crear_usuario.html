<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Centro Deportivo · Crear usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilos_crud.css">
</head>
<body>
<header class="navbar navbar-expand-lg align-items-center px-4 py-3 header-bg">
    <div class="container-fluid d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <a class="d-flex align-items-center gap-3 brand-link" href="../index.html">
          <img src="../images/logo.png" alt="Centro Deportivo" class="logo-img">
          <div class="brand-text">
            <div class="h6 mb-0">Centro Deportivo</div>
            <div class="small text-beige">Panel de Administración</div>
          </div>
        </a>
        <nav class="d-none d-md-flex gap-3 nav-left">
          <a class="nav-link text-beige" href="../index.html">Inicio</a>
          <a class="nav-link text-beige" href="cursos.htm">Cursos</a>
        </nav>
      </div>
      <a class="user-box d-flex align-items-center gap-2" href="perfil_usuario.htm">
        <img src="../images/avatar.jpg" alt="Avatar" class="user-avatar">
        <div class="user-name">Administrador</div>
      </a>
    </div>
  </header>
  <main class="container">
    <div class="page-card form-card">
      <h1 style="margin:0; font-size:1.6rem;">Crear nuevo usuario</h1>
      <p style="margin:8px 0 0; color:var(--muted);">Llena los datos para crear una cuenta de acceso.</p>
      
      <form action="#" method="post" enctype="multipart/form-data" novalidate>
        <div class="form-row">
          <div>
            <label class="form-label" for="firstName">Nombre</label>
            <input class="form-input" type="text" id="firstName" name="firstName" required placeholder="Ej. Ana" />
          </div>
          <div>
            <label class="form-label" for="lastName">Apellido</label>
            <input class="form-input" type="text" id="lastName" name="lastName" required placeholder="Ej. Pérez" />
          </div>
        </div>

        <div>
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" type="email" id="email" name="email" required placeholder="ejemplo@correo.com" />
        </div>

        <div>
          <label class="form-label" for="phone">Teléfono</label>
          <input class="form-input" type="tel" id="phone" name="phone" placeholder="Ej. 0414-1234567" />
        </div>

        <div>
          <label class="form-label" for="avatar">Foto de perfil</label>
          <input class="form-input" type="file" id="avatar" name="avatar" accept="image/*" />
        </div>

        <div class="form-row">
          <div>
            <label class="form-label" for="password">Contraseña</label>
            <input class="form-input" type="password" id="password" name="password" required placeholder="••••••••" />
          </div>
          <div>
            <label class="form-label" for="role">Rol</label>
            <select class="form-input" id="role" name="role" required>
              <option value="" disabled selected>Selecciona un rol</option>
              <option value="admin">Administrador</option>
              <option value="user">Usuario</option>
            </select>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:14px;flex-wrap:wrap;">
          <button type="reset" class="btn-outline-primary" style="min-width:120px;">Limpiar</button>
          <button type="submit" class="btn-primary" style="min-width:120px;">Crear usuario</button>
        </div>
      </form>
    </div>
  </main>
  <footer class="text-center py-3 small text-muted mt-5">© Centro Deportivo</footer>
</body>
</html>
